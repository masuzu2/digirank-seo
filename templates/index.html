{% extends "base.html" %}

{% block title %}
<title>หน้าแรก - ข้อมูลประชากร</title>
{% endblock %}

{% block content %}
<div class="container">
    <h2 style="color: blueviolet;">ยินดีต้อนรับเข้าสู่ประชากร</h2>
    <table class="table table-hover">
        <thead>
            <tr>
                <th scope="col">รหัสประชากร</th>
                <th scope="col">ชื่อประชากร</th>
                <th scope="col">อายุ</th>
                <th scope="col">แก้ไข</th>
                <th scope="col">ลบ</th>
            </tr>
        </thead>
        <tbody>
            {% for person in all_person %}
            <tr>
                <th scope="row">{{person.id}}</th>
                <td>{{person.name}}</td>
                <td>{{person.age}}</td>
                <td class="text-center"><a href="#" class="btn" style="background-color: pink; color: white;">แก้ไข</a></td>
                <td class="text-center"><a href="#" class="btn" style="background-color: orange; color: white;">ลบ</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
