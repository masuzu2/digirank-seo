{% extends "base.html" %}

{% block title %}
<title>แบบฟอร์มบันทึกข้อมูลประชากร</title>
{% endblock %}

{% block content %}
<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden hover-lift">
                <div class="card-header border-0 text-white p-4" style="background: linear-gradient(135deg, #198754, #20c997);">
                    <div class="text-center">
                        <i class="bi bi-person-lines-fill fs-1 mb-2"></i>
                        <h3 class="mb-0 fw-bold">แบบฟอร์มบันทึกข้อมูลประชากร</h3>
                        <p class="mb-0 text-white-50 small mt-1">กรุณากรอกข้อมูลให้ครบถ้วน</p>
                    </div>
                </div>

                <div class="card-body p-4 p-md-5 bg-white">
                    <form method="post" action="/form/">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="name" class="form-label">ชื่อประชากร</label>
                            <input type="text" class="form-control" name="name" placeholder="กรุณากรอกชื่อ-นามสกุล">
                        </div>

                        <div class="mb-3">
                            <label for="age" class="form-label">อายุ</label>
                            <input type="number" class="form-control" name="age" placeholder="กรอกข้อมูลอายุเป็นตัวเลข">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">ลงทะเบียน</button>
                            <button type="reset" class="btn btn-danger">ล้างข้อมูล</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
